name: slarti_stack

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - ../.env
    ports:
      - '5432:5432'
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slarti -d slarti"]
      interval: 10s
      timeout: 5s
      retries: 5
